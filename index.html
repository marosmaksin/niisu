<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #F8F7F5;
      --text:    #1C1C1A;
      --muted:   #8A8880;
      --accent:  #C8A882;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 560px;
      width: 100%;
    }

    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.3s;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--text);
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.55s;
    }

    h1 em {
      font-style: italic;
      font-weight: 300;
    }

    .rule-wrap {
      margin: 2.2rem auto;
      width: 100%;
      max-width: 320px;
      height: 1px;
      background: #E0DDD8;
      position: relative;
      overflow: hidden;
    }

    .rule-fill {
      position: absolute;
      top: 0; left: 0;
      height: 1px;
      width: 100%;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      animation: drawLine 1.4s cubic-bezier(0.4, 0, 0.2, 1) forwards 0.9s;
    }

    .subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 300;
      line-height: 1.75;
      color: var(--muted);
      letter-spacing: 0.01em;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.3s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes drawLine {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      .eyebrow, h1, .subtitle { animation: none; opacity: 1; }
      .rule-fill { animation: none; transform: scaleX(1); }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="eyebrow">Coming Soon</p>
    <h1>We're preparing <em>something</em> for you.</h1>
    <div class="rule-wrap"><div class="rule-fill"></div></div>
    <p class="subtitle">Our website is currently under construction.<br>Check back soon — it'll be worth the wait.</p>
  </div>
</body>
</html>
